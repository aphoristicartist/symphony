name = "symphony_gleam"
version = "0.1.0"
description = "Gleam implementation of the Symphony orchestrator for coding agents"
licences = ["MIT"]
repository = { type = "github", user = "aphoristicartist", repo = "symphony" }
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.34.0 and < 0.40.0"
gleam_otp = ">= 0.10.0 and < 1.0.0"
gleam_http = ">= 3.6.0 and < 4.0.0"
gleam_httpc = ">= 2.2.0 and < 3.0.0"
gleam_json = ">= 1.0.0 and < 2.0.0"
gleam_yaml = ">= 0.0.1 and < 1.0.0"
gleam_erlang = ">= 0.25.0 and < 0.30.0"
logging = ">= 1.0.0 and < 2.0.0"
filepath = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
